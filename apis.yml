apis:
- name: Google Cloud Logging API
  description: Writes log entries and manages your Cloud Logging configuration. The API is organized into the following resources - Entries (write and list log entries), Logs (list and delete logs), Logs-based metrics (create, update, and delete logs-based metrics), Resource descriptors (list monitored resource descriptors), Sinks (create, update, list, and delete sinks), Exclusions (create, update, list, and delete exclusions), CMEK settings (get and update CMEK settings).
  image: https://cloud.google.com/_static/images/cloud/icons/favicons/onecloud/super_cloud.png
  humanURL: https://cloud.google.com/logging
  baseURL: https://logging.googleapis.com
